cat > /var/www/html/login-panel.html << 'EOF'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Panel de Servidor - Zenithox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0C15, #121623);
            color: #EFF3F8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #A78BFA, #6366F1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .form-group {
            margin: 20px 0;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #A78BFA;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .form-input:focus {
            border-color: #A78BFA;
        }
        .login-btn {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        .footer-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }
        .footer-link {
            color: #A78BFA;
            text-decoration: none;
            font-size: 14px;
        }
        .footer-link:hover {
            text-decoration: underline;
        }
        .server-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            font-size: 14px;
            color: #A0A5C0;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22C55E;
            box-shadow: 0 0 8px #22C55E;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>ZENITHOX</h1>
            <p style="color: #A0A5C0;">Panel de Administración de Servidor</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input type="text" id="username" class="form-input" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-input" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>
        </form>

        <div class="server-info">
            <div><span class="status-indicator"></span> Servidor Principal: <strong>Online</strong></div>
            <div style="margin-top: 8px;">IP: <strong>103.90.160.107:25565</strong></div>
            <div>Ubicación: <strong>EU West</strong></div>
        </div>

        <div class="footer-links">
            <a href="#" class="footer-link">¿Olvidaste tu contraseña?</a>
            <a href="#" class="footer-link">Soporte</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // En un sistema real, aquí harías una llamada a tu backend para autenticar
            // fetch('http://103.90.160.107:3000/api/auth', { method: 'POST', body: JSON.stringify(...) })

            // Simulación de login exitoso
            if (username && password) {
                // Redirigir al panel del servidor (esto sería dinámico en un sistema real)
                window.location.href = 'server-panel.html';
            } else {
                alert('Credenciales incorrectas. Inténtalo de nuevo.');
            }
        });
    </script>
</body>
</html>
EOF
