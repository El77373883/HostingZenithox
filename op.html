<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zenithox Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter
}

body{
background:#020617;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* particles */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-3;
}

/* lightning */

#lightning{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
z-index:-2;
}

.bolt{
position:absolute;
top:-20%;
width:3px;
height:140%;
background:linear-gradient(
to bottom,
rgba(255,255,255,0),
rgba(255,255,255,.9),
rgba(255,255,255,0)
);
opacity:0;
filter:blur(1px);
transform:skewX(-20deg);
animation:flash .5s linear;
}

@keyframes flash{

0%{opacity:0}
10%{opacity:1}
20%{opacity:.4}
30%{opacity:1}
100%{opacity:0}

}

/* header */

.header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:22px;
font-weight:700;
color:#8b5cf6;
}

.currency{
background:#0f172a;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
}

/* hero */

.hero{
text-align:center;
padding:60px 20px;
}

.hero svg{
width:90px;
margin-bottom:20px;
animation:float 5s infinite ease-in-out;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}

}

/* layout */

.container{
max-width:1200px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:1fr 420px;
gap:40px;
}

.card{
background:#0f172a;
padding:30px;
border-radius:14px;
border:1px solid rgba(255,255,255,.05);
}

/* plans */

.plans{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-bottom:20px;
}

.plan{
background:#020617;
padding:10px;
text-align:center;
border-radius:8px;
cursor:pointer;
border:2px solid transparent;
transition:.2s;
}

.plan:hover{
background:#1e293b;
}

.plan.active{
border-color:#8b5cf6;
background:#1e293b;
}

/* sliders */

.slider{
width:100%;
margin-bottom:15px;
}

.slider-value{
margin-bottom:6px;
opacity:.8;
}

/* inputs */

.input{
width:100%;
padding:12px;
border:none;
background:#020617;
border-radius:8px;
color:white;
margin-bottom:10px;
}

/* payments */

.payments{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.payment{
background:#020617;
padding:12px;
border-radius:8px;
cursor:pointer;
text-align:center;
border:2px solid transparent;
}

.payment.active{
border-color:#8b5cf6;
background:#1e293b;
}

/* buttons */

button{
padding:14px;
border-radius:10px;
border:none;
background:#111827;
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

.primary{
width:100%;
margin-top:15px;
background:linear-gradient(135deg,#7c3aed,#6366f1);
}

/* summary */

.summary-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
display:flex;
justify-content:space-between;
font-size:20px;
font-weight:700;
margin-top:10px;
}

</style>
</head>

<body>

<div id="particles-js"></div>
<div id="lightning"></div>

<div class="header">

<div class="logo">Zenithox</div>

<select class="currency">
<option>USD</option>
<option>EUR</option>
<option>MXN</option>
</select>

</div>

<div class="hero">

<svg viewBox="0 0 24 24" fill="#8b5cf6">
<rect x="3" y="4" width="18" height="6" rx="2"/>
<rect x="3" y="14" width="18" height="6" rx="2"/>
</svg>

<h1>Zenithox Hosting</h1>
<p>Checkout test environment</p>

</div>

<div class="container">

<div class="card">

<h3>Quick Plans</h3>

<div class="plans">

<div class="plan">1GB</div>
<div class="plan">2GB</div>
<div class="plan">4GB</div>
<div class="plan">6GB</div>
<div class="plan">8GB</div>
<div class="plan">10GB</div>
<div class="plan">12GB</div>
<div class="plan">16GB</div>
<div class="plan">32GB</div>

</div>

<div class="slider-value">RAM <span id="ramValue">4</span>GB</div>
<input id="ram" type="range" min="1" max="32" value="4" class="slider">

<div class="slider-value">CPU <span id="cpuValue">2</span></div>
<input id="cpu" type="range" min="1" max="16" value="2" class="slider">

<div class="slider-value">Storage <span id="storageValue">40</span>GB</div>
<input id="storage" type="range" min="20" max="500" value="40" step="20" class="slider">

<h3>Servers</h3>

<select id="servers" class="input">
<option value="1">1 Server</option>
<option value="2">2 Servers</option>
</select>

<h3>Customer</h3>

<input class="input" placeholder="Full Name">
<input class="input" placeholder="Email">

<h3>Payment</h3>

<div class="payments">

<div class="payment">Card</div>
<div class="payment">PayPal</div>
<div class="payment">Apple Pay</div>
<div class="payment">Google Pay</div>
<div class="payment">Gift Card</div>
<div class="payment">Balance</div>

</div>

</div>

<div class="card">

<h3>Order Summary</h3>

<div class="summary-item">
<span>RAM</span>
<span id="sumRam">4GB</span>
</div>

<div class="summary-item">
<span>CPU</span>
<span id="sumCpu">2</span>
</div>

<div class="summary-item">
<span>Storage</span>
<span id="sumStorage">40GB</span>
</div>

<div class="summary-item">
<span>Servers</span>
<span id="sumServers">1</span>
</div>

<div class="summary-item">
<span>Price</span>
<span>$0</span>
</div>

<hr style="opacity:.2;margin:10px 0">

<div class="total">
<span>Total</span>
<span>$0</span>
</div>

<input class="input" placeholder="Discount Code">

<button>Apply Code</button>

<button class="primary" onclick="checkout()">Create Server</button>

</div>

</div>

<script>

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
})

/* lightning */

function createLightning(){

let bolt=document.createElement("div")
bolt.className="bolt"

bolt.style.left=Math.random()*100+"%"

document.getElementById("lightning").appendChild(bolt)

setTimeout(()=>{
bolt.remove()
},500)

}

setInterval(()=>{
if(Math.random()<0.5){
createLightning()
}
},1200)

/* update config */

function update(){

let ram=document.getElementById("ram").value
let cpu=document.getElementById("cpu").value
let storage=document.getElementById("storage").value
let servers=document.getElementById("servers").value

document.getElementById("ramValue").innerText=ram
document.getElementById("cpuValue").innerText=cpu
document.getElementById("storageValue").innerText=storage

document.getElementById("sumRam").innerText=ram+"GB"
document.getElementById("sumCpu").innerText=cpu
document.getElementById("sumStorage").innerText=storage+"GB"
document.getElementById("sumServers").innerText=servers

}

document.querySelectorAll(".slider").forEach(s=>s.oninput=update)
document.getElementById("servers").onchange=update

document.querySelectorAll(".payment").forEach(p=>{
p.onclick=()=>{
document.querySelectorAll(".payment").forEach(x=>x.classList.remove("active"))
p.classList.add("active")
}
})

document.querySelectorAll(".plan").forEach(p=>{
p.onclick=()=>{
document.getElementById("ram").value=parseInt(p.innerText)
update()
}
})

function checkout(){
alert("Server created in TEST MODE ($0)")
}

update()

</script>

</body>
</html>
