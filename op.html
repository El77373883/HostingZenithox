<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenithox Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter}

body{
background:#020617;
color:white;
min-height:100vh
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1
}

/* header */

.header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,.05)
}

.logo{
font-weight:700;
font-size:22px;
color:#a78bfa
}

.currency{
background:#0f172a;
border:none;
padding:8px 12px;
border-radius:6px;
color:white
}

/* hero */

.hero{
text-align:center;
padding:50px 20px
}

.hero img{
width:130px;
margin-bottom:20px;
animation:float 6s infinite ease-in-out
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* layout */

.container{
max-width:1200px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:1fr 420px;
gap:40px
}

.card{
background:#0f172a;
padding:30px;
border-radius:14px;
border:1px solid rgba(255,255,255,.05)
}

.section-title{
margin-bottom:10px;
font-weight:600
}

/* sliders */

.slider{
width:100%;
margin-bottom:15px
}

.slider-value{
margin-bottom:10px;
opacity:.8
}

/* payments */

.payments{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px
}

.payment{
background:#020617;
padding:12px;
border-radius:8px;
cursor:pointer;
text-align:center;
border:2px solid transparent
}

.payment.active{
border-color:#a78bfa;
background:#1e293b
}

/* inputs */

.input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#020617;
color:white;
margin-bottom:10px
}

/* summary */

.summary-item{
display:flex;
justify-content:space-between;
margin-bottom:10px
}

.total{
display:flex;
justify-content:space-between;
font-size:20px;
font-weight:700;
margin-top:10px
}

button{
padding:14px;
border:none;
border-radius:8px;
cursor:pointer
}

.primary{
width:100%;
margin-top:20px;
background:linear-gradient(90deg,#7c3aed,#6366f1);
color:white;
font-weight:600
}

.policy{
margin-top:20px;
font-size:13px;
opacity:.7;
text-align:center
}

@media(max-width:900px){
.container{grid-template-columns:1fr}
}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="header">

<div class="logo">Zenithox</div>

<select id="currency" class="currency">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="MXN">MXN</option>
</select>

</div>

<div class="hero">

<img src="https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif">

<h1>Zenithox Cloud Servers</h1>

</div>

<div class="container">

<div class="card">

<div class="section-title">Server Configuration</div>

<div class="slider-value">RAM: <span id="ramValue">4</span> GB</div>
<input type="range" min="2" max="64" value="4" step="2" id="ram" class="slider">

<div class="slider-value">CPU: <span id="cpuValue">2</span> vCores</div>
<input type="range" min="1" max="16" value="2" step="1" id="cpu" class="slider">

<div class="slider-value">Storage: <span id="storageValue">40</span> GB SSD</div>
<input type="range" min="20" max="500" value="40" step="20" id="storage" class="slider">

<div class="section-title">Customer</div>

<input class="input" placeholder="Full Name">
<input class="input" placeholder="Email">

<div class="section-title">Payment Method</div>

<div class="payments">

<div class="payment">Card</div>
<div class="payment">PayPal</div>
<div class="payment">Apple Pay</div>
<div class="payment">Google Pay</div>
<div class="payment">Gift Card</div>
<div class="payment">Balance</div>

</div>

</div>

<div class="card">

<div class="section-title">Order Summary</div>

<div class="summary-item">
<span>RAM</span>
<span id="sumRam">4GB</span>
</div>

<div class="summary-item">
<span>CPU</span>
<span id="sumCpu">2</span>
</div>

<div class="summary-item">
<span>Storage</span>
<span id="sumStorage">40GB</span>
</div>

<div class="summary-item">
<span>Price</span>
<span id="price">$0</span>
</div>

<hr style="opacity:.2;margin:10px 0">

<div class="total">
<span>Total</span>
<span id="total">$0</span>
</div>

<input id="coupon" class="input" placeholder="Discount Code">
<button onclick="applyCoupon()">Apply Code</button>

<button class="primary" onclick="checkout()">Create Server</button>

<div class="policy">
Refunds available up to 15 days after purchase
</div>

</div>

</div>

<script>

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
})

let currency="USD"
let discount=0

let ram=4
let cpu=2
let storage=40

let payment=null

/* sliders */

function update(){

ram=document.getElementById("ram").value
cpu=document.getElementById("cpu").value
storage=document.getElementById("storage").value

document.getElementById("ramValue").innerText=ram
document.getElementById("cpuValue").innerText=cpu
document.getElementById("storageValue").innerText=storage

document.getElementById("sumRam").innerText=ram+"GB"
document.getElementById("sumCpu").innerText=cpu
document.getElementById("sumStorage").innerText=storage+"GB"

/* pricing formula */

let price=(ram*1)+(cpu*2)+(storage*0.02)

price=price-(price*discount)

document.getElementById("price").innerText=format(price)
document.getElementById("total").innerText=format(price)

}

document.querySelectorAll(".slider").forEach(s=>{
s.oninput=update
})

/* payment */

document.querySelectorAll(".payment").forEach(p=>{
p.onclick=()=>{
document.querySelectorAll(".payment").forEach(x=>x.classList.remove("active"))
p.classList.add("active")
payment=p.innerText
}
})

/* currency */

document.getElementById("currency").onchange=e=>{
currency=e.target.value
update()
}

function format(v){

v=v.toFixed(2)

if(currency==="EUR") return "€"+v
if(currency==="MXN") return "$"+v+" MXN"

return "$"+v

}

/* coupon */

function applyCoupon(){

let code=document.getElementById("coupon").value.toUpperCase()

if(code==="FIRST10"){
discount=.10
alert("Discount applied")
}else{
alert("Invalid code")
}

update()

}

function checkout(){

if(!payment){
alert("Select payment method")
return
}

alert("Server created: "+ram+"GB RAM / "+cpu+" CPU / "+storage+"GB Storage")

}

update()

</script>

</body>
</html>
