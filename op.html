<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenithox Premium Host</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
body{margin:0;background:#0b0f1e;color:white;font-family:Inter;overflow-x:hidden;}
.header{padding:30px;text-align:center;}
.header h1{font-size:42px;background:linear-gradient(90deg,#7c3aed,#22c55e,#38bdf8);-webkit-background-clip:text;color:transparent;animation:gradientMove 6s linear infinite;}
@keyframes gradientMove{0%{background-position:0%}100%{background-position:300%}}
.container{display:flex;justify-content:center;align-items:flex-start;padding:40px;gap:40px;flex-wrap:wrap;}
.card{background:rgba(20,25,50,.95);padding:30px;border-radius:20px;box-shadow:0 15px 35px rgba(0,0,0,.7);transition:all .3s;max-width:400px;}
.card:hover{transform:rotateY(5deg) rotateX(3deg) translateZ(10px);box-shadow:0 25px 50px rgba(0,0,0,.8);}
.card h2{margin-bottom:20px;text-align:center;}
.card p{opacity:.9;line-height:1.4;margin-bottom:15px;text-align:center;}
.input{width:100%;padding:12px;border:none;border-radius:10px;background:#0b0f1e;color:white;margin-bottom:12px;}
.input:focus{outline:none;background:#11162a;}
#card-element{padding:12px;border-radius:10px;background:#0b0f1e;border:1px solid #333;margin-bottom:12px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#6366f1);cursor:pointer;color:white;font-weight:600;transition:all .3s;margin-top:10px;}
button:hover{transform:scale(1.03);box-shadow:0 8px 20px rgba(124,58,237,.6);}
.secure{display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.secure div{margin-left:10px;font-weight:700;color:#34d399;}
.footer{text-align:center;font-size:12px;margin-top:30px;color:rgba(255,255,255,.6);}
#paymentOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999;}
#paymentOverlay .loader{border:8px solid #f3f3f3;border-top:8px solid #7c3aed;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.confetti-piece{position:absolute;width:10px;height:10px;background:red;top:0;animation:fall 2s linear infinite;opacity:0;}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(360deg);opacity:0}}
</style>
</head>
<body>

<div class="header">
<h1>Zenithox Premium Hosting</h1>
</div>

<div class="container">
<div class="card">
<div class="secure"><img src="https://img.icons8.com/ios-glyphs/30/34d399/lock.png"/><div>100% Seguro</div></div>
<h2>Formulario de Pago</h2>
<input class="input" id="customerName" placeholder="Nombre Completo">
<input class="input" id="customerEmail" placeholder="Correo Electrónico">
<div id="card-element"></div>
<div id="card-errors" role="alert" style="color:#f87171;margin-bottom:12px;"></div>
<button id="payButton">Pagar & Crear Servidor</button>
</div>
</div>

<div class="footer">Zenithox — Hecho por soyadrianyt001 Company 2026</div>

<div id="paymentOverlay">
<div class="loader"></div>
<div id="paymentMessage" style="color:white;font-size:18px;">Procesando pago...</div>
</div>

<div id="confetti-container"></div>

<script>
const stripe = Stripe("TU_PUBLISHABLE_KEY_AQUI"); // Cambiar por tu clave pública
const elements = stripe.elements();
const card = elements.create("card",{style:{base:{color:"#fff",fontFamily:"Inter",fontSize:"16px",::placeholder:{color:"#888"}}}});
card.mount("#card-element");

document.getElementById("payButton").addEventListener("click", async ()=>{
    const overlay=document.getElementById("paymentOverlay");
    const msg=document.getElementById("paymentMessage");
    overlay.style.display="flex";

    const name=document.getElementById("customerName").value;
    const email=document.getElementById("customerEmail").value;

    // Envía datos al backend
    const response=await fetch("/create-payment-intent",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,email,amount:1000})
    });
    const paymentIntent=await response.json();
    const result=await stripe.confirmCardPayment(paymentIntent.client_secret,{payment_method:{card,billing_details:{name,email}}});

    if(result.error){msg.innerText=result.error.message;setTimeout(()=>{overlay.style.display="none"},2000);}
    else if(result.paymentIntent.status==="succeeded"){
        msg.innerText="Pago aprobado ✅";
        launchConfetti();
        setTimeout(()=>{overlay.style.display="none";alert("Servidor creado exitosamente!");},1500);
    }
});

function launchConfetti(){
    const container=document.getElementById("confetti-container");
    for(let i=0;i<30;i++){
        let c=document.createElement("div");
        c.className="confetti-piece";
        c.style.backgroundColor=['#f87171','#34d399','#60a5fa','#facc15','#f472b6'][Math.floor(Math.random()*5)];
        c.style.left=Math.random()*100+"%";
        c.style.animationDelay=Math.random()*1+"s";
        container.appendChild(c);
        setTimeout(()=>{c.remove()},2000);
    }
}
</script>
</body>
</html>
