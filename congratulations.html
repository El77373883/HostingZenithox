<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenithox | ¡Compra Exitosa!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c15, #121623);
            color: #eff3f8;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-container {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            color: #10B981;
            margin-bottom: 24px;
            animation: bounce 1s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .credentials-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .credential-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #A78BFA);
        }
    </style>
</head>
<body>

<div class="success-container">
    <div class="success-icon">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1>¡Compra Exitosa!</h1>
    <p style="margin: 16px 0; color: #A0A5C0;">Tu servidor está listo para usarse.</p>

    <div class="credentials-box">
        <h3 style="margin-bottom: 20px; text-align: center;">Credenciales del Servidor</h3>
        <div class="credential-row">
            <span>IP del Servidor:</span>
            <span style="color: #A78BFA;">103.90.160.107</span>
        </div>
        <div class="credential-row">
            <span>Puerto:</span>
            <span style="color: #A78BFA;">25565</span>
        </div>
        <div class="credential-row">
            <span>Nombre de Conexión:</span>
            <span style="color: #A78BFA;">empire.playminecraft.online</span>
        </div>
        <div class="credential-row">
            <span>Usuario SFTP:</span>
            <span style="color: #A78BFA;">server-12345</span>
        </div>
        <div class="credential-row">
            <span>Contraseña SFTP:</span>
            <span style="color: #A78BFA;">********</span>
        </div>
    </div>

    <a href="server-panel.html" class="btn btn-primary">
        Ir al Panel de Control
    </a>
</div>

<script>
    // En producción, aquí leerías las credenciales dinámicamente desde URL params o Firestore
</script>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
